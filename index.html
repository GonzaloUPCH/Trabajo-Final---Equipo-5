<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica - Acceso al sistema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-icon">🏥</span>
        <h1>Sistema de Gestión</h1>
        <p>Clínica - Acceso al sistema</p>
      </div>

      <div class="auth-tabs">
        <button type="button" id="tab-login" class="auth-tab active">Iniciar Sesión</button>
        <button type="button" id="tab-registro" class="auth-tab">Registrarse</button>
      </div>

      <section id="login-view">
        <div id="login-error" class="auth-error hidden"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-correo">Correo electrónico</label>
            <input type="email" id="login-correo" name="login-correo" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" name="login-password" placeholder="Contraseña" required>
          </div>
          <button type="submit" id="btn-login" class="btn-primary">Iniciar Sesión</button>
        </form>
      </section>

      <section id="register-view" class="hidden">
        <div id="reg-error" class="auth-error hidden"></div>
        <div id="reg-success" class="auth-success hidden"></div>
        <form id="register-form">
          <div class="form-group">
            <label for="reg-nombre">Nombre completo</label>
            <input type="text" id="reg-nombre" name="reg-nombre" placeholder="Nombre completo" required>
          </div>
          <div class="form-group">
            <label for="reg-correo">Correo electrónico</label>
            <input type="email" id="reg-correo" name="reg-correo" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" name="reg-password" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label for="reg-confirmar">Confirmar contraseña</label>
            <input type="password" id="reg-confirmar" name="reg-confirmar" placeholder="Repite la contraseña" required>
          </div>
          <div class="form-group">
            <label for="reg-rol">Rol</label>
            <select id="reg-rol" name="reg-rol" required>
              <option value="">Seleccionar rol</option>
              <option value="Administrador">Administrador</option>
              <option value="Recepción">Recepción</option>
              <option value="Médico">Médico</option>
              <option value="Enfermería">Enfermería</option>
            </select>
          </div>
          <button type="submit" id="btn-registro" class="btn-primary">Crear cuenta</button>
        </form>
      </section>
    </div>
  </div>

  <script type="module">
    import { registerUser, loginUser, getUserProfile, getCurrentUser } from './js/auth.js'

    const loginView = document.getElementById('login-view')
    const registerView = document.getElementById('register-view')

    const tabLogin = document.getElementById('tab-login')
    const tabRegistro = document.getElementById('tab-registro')

    const loginForm = document.getElementById('login-form')
    const loginCorreo = document.getElementById('login-correo')
    const loginPassword = document.getElementById('login-password')
    const loginError = document.getElementById('login-error')

    const registerForm = document.getElementById('register-form')
    const regNombre = document.getElementById('reg-nombre')
    const regCorreo = document.getElementById('reg-correo')
    const regPassword = document.getElementById('reg-password')
    const regConfirmar = document.getElementById('reg-confirmar')
    const regRol = document.getElementById('reg-rol')
    const regError = document.getElementById('reg-error')
    const regSuccess = document.getElementById('reg-success')

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

    function showMessage(el, text) {
      el.textContent = text
      el.classList.remove('hidden')
    }

    function hideMessage(el) {
      el.textContent = ''
      el.classList.add('hidden')
    }

    tabLogin.addEventListener('click', () => {
      loginView.classList.remove('hidden')
      registerView.classList.add('hidden')
      tabLogin.classList.add('active')
      tabRegistro.classList.remove('active')
      hideMessage(loginError)
    })

    tabRegistro.addEventListener('click', () => {
      registerView.classList.remove('hidden')
      loginView.classList.add('hidden')
      tabRegistro.classList.add('active')
      tabLogin.classList.remove('active')
      hideMessage(regError)
      hideMessage(regSuccess)
    })

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault()
      hideMessage(loginError)

      const correo = loginCorreo.value.trim()
      const password = loginPassword.value

      if (!emailRegex.test(correo)) {
        showMessage(loginError, 'Ingresa un correo electrónico válido.')
        return
      }

      if (!password) {
        showMessage(loginError, 'La contraseña es obligatoria.')
        return
      }

      const { error } = await loginUser(correo, password)

      if (error) {
        showMessage(loginError, 'Correo o contraseña incorrectos.')
        return
      }

      const user = await getCurrentUser()
      if (!user) {
        showMessage(loginError, 'No se pudo obtener la sesión. Intenta de nuevo.')
        return
      }

      const profile = await getUserProfile(user.id)
      if (!profile) {
        showMessage(loginError, 'No se encontró el perfil del usuario.')
        return
      }

      sessionStorage.setItem('user_rol', profile.rol)
      sessionStorage.setItem('user_nombre', profile.nombre)
      window.location.href = 'pages/dashboard.html'
    })

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault()
      hideMessage(regError)
      hideMessage(regSuccess)

      const nombre = regNombre.value.trim()
      const correo = regCorreo.value.trim()
      const password = regPassword.value
      const confirmar = regConfirmar.value
      const rol = regRol.value

      if (!nombre || !correo || !password || !confirmar || !rol) {
        showMessage(regError, 'Todos los campos son obligatorios.')
        return
      }

      if (!emailRegex.test(correo)) {
        showMessage(regError, 'Ingresa un correo electrónico válido.')
        return
      }

      if (password.length < 6) {
        showMessage(regError, 'La contraseña debe tener al menos 6 caracteres.')
        return
      }

      if (password !== confirmar) {
        showMessage(regError, 'Las contraseñas no coinciden.')
        return
      }

      const { error } = await registerUser(nombre, correo, password, rol)

      if (error) {
        showMessage(regError, error.message)
        return
      }

      showMessage(regSuccess, 'Cuenta creada correctamente. Redirigiendo al inicio de sesión...')
      registerForm.reset()

      setTimeout(() => {
        registerView.classList.add('hidden')
        loginView.classList.remove('hidden')
        tabLogin.classList.add('active')
        tabRegistro.classList.remove('active')
        hideMessage(regSuccess)
      }, 2000)
    })
  </script>
</body>
</html>
