<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica - Dashboard</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="dashboard-header">
    <h1 class="system-name">Sistema de Gestión - Clínica</h1>
    <div class="header-user">
      <span class="welcome-message">Bienvenido, <strong id="user-nombre"></strong></span>
      <button type="button" id="btn-logout" class="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <main class="dashboard-main">
    <h2 class="dashboard-subtitle">Módulos</h2>
    <nav class="module-grid">
      <a href="../pages/pacientes.html" class="module-card" data-module="pacientes">
        <span class="module-title">Pacientes</span>
        <span class="module-desc">Gestión de pacientes</span>
      </a>
      <a href="../pages/citas.html" class="module-card" data-module="citas">
        <span class="module-title">Citas</span>
        <span class="module-desc">Programación de citas</span>
      </a>
      <a href="../pages/sala-espera.html" class="module-card" data-module="sala-espera">
        <span class="module-title">Sala de Espera</span>
        <span class="module-desc">Control de sala de espera</span>
      </a>
      <a href="../pages/historial.html" class="module-card" data-module="historial">
        <span class="module-title">Historial</span>
        <span class="module-desc">Historial de consultas</span>
      </a>
    </nav>
  </main>

  <script type="module">
    import { logoutUser } from '../js/auth.js'

    const userRol = sessionStorage.getItem('user_rol')
    const userNombre = sessionStorage.getItem('user_nombre')

    if (!userRol) {
      window.location.href = '../index.html'
      throw new Error('No session')
    }

    const permisos = {
      'Administrador': ['pacientes', 'citas', 'sala-espera', 'historial'],
      'Recepción': ['pacientes', 'citas', 'sala-espera'],
      'Médico': ['sala-espera', 'historial'],
      'Enfermería': ['sala-espera']
    }

    document.getElementById('user-nombre').textContent = userNombre || ''

    const modulosPermitidos = permisos[userRol] || []
    document.querySelectorAll('.module-card').forEach((card) => {
      if (!modulosPermitidos.includes(card.dataset.module)) {
        card.classList.add('hidden')
      }
    })

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await logoutUser()
      sessionStorage.clear()
      window.location.href = '../index.html'
    })
  </script>
</body>
</html>
